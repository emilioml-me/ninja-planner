upstream ninja_planner_stg {
    server 127.0.0.1:3208;
}

server {
    listen 80;
    server_name ninja-planner.njn-stg.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ninja-planner.njn-stg.com;

    ssl_certificate     /etc/letsencrypt/live/njn-stg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/njn-stg.com/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://ninja_planner_stg;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
