services:
  ninja-planner:
    image: ninja-planner:1.0.0
    container_name: ninja-planner
    restart: unless-stopped
    env_file: /srv/secrets/plan-ninja.env
    ports:
      - "127.0.0.1:3206:3206"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3206/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ninja-internal

networks:
  ninja-internal:
    external: true
